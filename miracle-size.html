// ─── WEIGHT MODAL ─────────────────────────────────────────────────────────────

function WeightModal({ t, exercise, weekData, onSave, onClose }) {
  const [entries, setEntries] = useState(
    Array.from({ length: TOTAL_WEEKS }, (_, i) => weekData[i] ?? "")
  );

  const parsed = entries.map(v => parseFloat(v));
  const valid = parsed.filter(n => !isNaN(n));
  const best = valid.length ? Math.max(...valid) : null;

  const s = {
    overlay: {
      position: "fixed", inset: 0, zIndex: 200,
      background: "rgba(0,0,0,0.65)", backdropFilter: "blur(6px)",
      display: "flex", alignItems: "flex-end", justifyContent: "center",
      padding: "0",
    },
    sheet: {
      background: t.bg, borderRadius: "20px 20px 0 0",
      border: `1px solid ${t.border}`, borderBottom: "none",
      padding: "1.25rem 1.5rem 2.5rem",
      width: "100%", maxWidth: 560,
      boxShadow: t.shadow,
    },
    handle: {
      width: 36, height: 4, borderRadius: 9999,
      background: t.border, margin: "0 auto 1.25rem",
    },
    statBox: {
      flex: 1, background: t.surface, border: `1px solid ${t.divider}`,
      borderRadius: 10, padding: "0.75rem 1rem",
    },
  };

  return (
    <div style={s.overlay} onClick={onClose}>
      <div style={s.sheet} onClick={e => e.stopPropagation()}>
        <div style={s.handle} />

        <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginBottom: "0.2rem" }}>Weight progression</p>
        <h3 style={{ fontSize: "1.05rem", fontWeight: 600, color: t.textPrimary, lineHeight: 1.2, marginBottom: "0.2rem" }}>
          {exercise.name}
        </h3>
        <p style={{ fontSize: "0.8rem", color: t.textTertiary, marginBottom: "1.25rem" }}>{exercise.sets}</p>

        {valid.length > 0 && (
          <div style={{ display: "flex", gap: "0.625rem", marginBottom: "1.25rem" }}>
            <div style={s.statBox}>
              <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginBottom: "0.2rem" }}>Best</p>
              <p style={{ fontSize: "1.25rem", fontWeight: 700, color: t.indigo }}>{best}<span style={{ fontSize: "0.75rem", fontWeight: 400, marginLeft: 2 }}>kg</span></p>
            </div>
            <div style={s.statBox}>
              <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginBottom: "0.2rem" }}>Logged</p>
              <p style={{ fontSize: "1.25rem", fontWeight: 700, color: t.success }}>{valid.length}<span style={{ fontSize: "0.75rem", fontWeight: 400, marginLeft: 2 }}>/ {TOTAL_WEEKS} wks</span></p>
            </div>
          </div>
        )}

        {/* Bar chart */}
        {valid.length >= 2 && (
          <div style={{ background: t.surface, border: `1px solid ${t.divider}`, borderRadius: 10, padding: "0.875rem", marginBottom: "1.25rem" }}>
            <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginBottom: "0.625rem" }}>Progression</p>
            <div style={{ display: "flex", alignItems: "flex-end", gap: "0.375rem", height: 52 }}>
              {entries.map((v, i) => {
                const n = parseFloat(v);
                const maxV = Math.max(...valid);
                const minV = Math.min(...valid);
                const range = maxV - minV || 1;
                const h = isNaN(n) ? 0 : Math.round(((n - minV) / range) * 65 + 35);
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{
                      width: "100%",
                      height: isNaN(n) ? 4 : `${h}%`,
                      background: isNaN(n) ? t.divider : t.indigo,
                      borderRadius: "3px 3px 0 0",
                      opacity: isNaN(n) ? 0.4 : 1,
                      transition: "height 300ms ease",
                      minHeight: 4,
                    }} />
                    <span style={{ fontSize: "0.6rem", color: t.textQuinary }}>{i + 1}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Inputs */}
        <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem", marginBottom: "1.25rem" }}>
          {entries.map((val, i) => {
            const curr = parseFloat(val);
            const prev = parseFloat(entries[i - 1]);
            const diff = !isNaN(curr) && !isNaN(prev) ? +(curr - prev).toFixed(1) : null;
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                <span style={{ fontSize: "0.75rem", color: t.textQuaternary, width: 52, flexShrink: 0 }}>Week {i + 1}</span>
                <div style={{ flex: 1, position: "relative" }}>
                  <input
                    type="number"
                    inputMode="decimal"
                    placeholder="—"
                    value={val}
                    onChange={e => {
                      const next = [...entries];
                      next[i] = e.target.value;
                      setEntries(next);
                    }}
                    style={{
                      width: "100%", height: 38,
                      padding: "0 2.5rem 0 0.875rem",
                      fontSize: "0.9rem", fontFamily: "inherit",
                      color: t.textSecondary, background: t.surface,
                      border: `1px solid ${t.border}`, borderRadius: 8,
                      outline: "none",
                    }}
                  />
                  <span style={{
                    position: "absolute", right: "0.7rem", top: "50%", transform: "translateY(-50%)",
                    fontSize: "0.72rem", color: t.textQuaternary, pointerEvents: "none",
                  }}>kg</span>
                </div>
                <span style={{
                  fontSize: "0.72rem", fontWeight: 600, width: 40, textAlign: "right", flexShrink: 0,
                  color: diff === null ? "transparent" : diff > 0 ? t.success : diff < 0 ? t.coral : t.textQuaternary,
                }}>
                  {diff === null ? "—" : diff > 0 ? `+${diff}` : `${diff}`}
                </span>
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: "0.75rem" }}>
          <button onClick={onClose} style={{
            flex: 1, height: 44, borderRadius: 10,
            background: "transparent", border: `1px solid ${t.border}`,
            fontSize: "0.9rem", fontWeight: 500, color: t.textSecondary,
            cursor: "pointer", fontFamily: "inherit",
          }}>Cancel</button>
          <button onClick={() => onSave(entries)} style={{
            flex: 1, height: 44, borderRadius: 10,
            background: t.indigo, border: "none",
            fontSize: "0.9rem", fontWeight: 600, color: "#fff",
            cursor: "pointer", fontFamily: "inherit",
          }}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── EXERCISE ROW ─────────────────────────────────────────────────────────────

function ExRow({ t, ex, dayId, activeWeek, checks, weights, onToggle, onWeightOpen }) {
  const checkKey = `d${dayId}-e${ex.name}-w${activeWeek}`;
  const done = !!checks[checkKey];
  const logKey = `d${dayId}-e${ex.name}`;
  const wArr = weights[logKey] || [];
  const currW = wArr[activeWeek - 1];
  const prevW = wArr[activeWeek - 2];
  const hasWeight = currW !== undefined && currW !== "";
  const diff = hasWeight && prevW !== undefined && prevW !== ""
    ? +(parseFloat(currW) - parseFloat(prevW)).toFixed(1) : null;

  const tagC = ex.tag === "neck" ? t.tagNeck : ex.tag === "drop set" ? t.tagDrop : ex.tag === "pump" ? t.tagPump : null;

  return (
    <div style={{
      display: "flex", alignItems: "flex-start", gap: "0.75rem",
      padding: "0.9rem 1rem",
      borderBottom: `1px solid ${t.divider}`,
      background: done ? t.surfaceHover : t.bg,
      transition: "background 150ms",
    }}>
      <button
        onClick={() => onToggle(checkKey)}
        style={{
          width: 20, height: 20, borderRadius: 5, flexShrink: 0, marginTop: 1,
          border: done ? "none" : `1.5px solid ${t.border}`,
          background: done ? t.indigo : "transparent",
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          transition: "all 150ms", padding: 0,
        }}
      >
        {done && <CheckIcon />}
      </button>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: "0.4rem", marginBottom: "0.15rem" }}>
          <span style={{
            fontSize: "0.9rem", fontWeight: 500,
            color: done ? t.textQuaternary : t.textPrimary,
            textDecoration: done ? "line-through" : "none",
            transition: "color 150ms",
          }}>{ex.name}</span>
          {tagC && (
            <span style={{
              fontSize: "0.68rem", fontWeight: 500,
              color: tagC.color, background: tagC.bg,
              borderRadius: 9999, padding: "1px 7px",
            }}>{ex.tag}</span>
          )}
        </div>
        <div style={{
          fontSize: "0.78rem", fontWeight: 500,
          color: done ? t.textQuinary : t.indigo,
          marginBottom: ex.note ? "0.2rem" : 0,
        }}>{ex.sets}</div>
        {ex.note && <p style={{ fontSize: "0.78rem", color: t.textTertiary, lineHeight: 1.5 }}>{ex.note}</p>}
        {hasWeight && (
          <div style={{ display: "flex", alignItems: "center", gap: "0.4rem", marginTop: "0.4rem" }}>
            <span style={{
              fontSize: "0.72rem", fontWeight: 600, color: t.indigo,
              background: t.surface, border: `1px solid ${t.border}`,
              borderRadius: 9999, padding: "1px 8px",
            }}>{currW} kg</span>
            {diff !== null && (
              <span style={{
                fontSize: "0.72rem", fontWeight: 600,
                color: diff > 0 ? t.success : diff < 0 ? t.coral : t.textQuaternary,
              }}>{diff > 0 ? `↑ +${diff}` : diff < 0 ? `↓ ${diff}` : "→ same"}</span>
            )}
          </div>
        )}
      </div>

      <div style={{ display: "flex", gap: "0.35rem", flexShrink: 0, marginTop: 1 }}>
        <button
          onClick={() => onWeightOpen(ex)}
          style={{
            width: 32, height: 32, borderRadius: 7,
            border: `1px solid ${t.border}`, background: "transparent",
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            color: t.textQuaternary,
          }}
        ><WeightIcon /></button>
        <a
          href={ex.video} target="_blank" rel="noopener noreferrer"
          style={{
            width: 32, height: 32, borderRadius: 7,
            border: `1px solid ${t.border}`, background: "transparent",
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            color: t.textQuaternary, textDecoration: "none",
          }}
        ><PlayIcon /></a>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const load = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } };
  const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

  const [dark, setDark] = useState(() => load("msp_dark", false));
  const [activeDay, setActiveDay] = useState(() => load("msp_day", 1));
  const [activeWeek, setActiveWeek] = useState(() => load("msp_week", 1));
  const [checks, setChecks] = useState(() => load("msp_checks", {}));
  const [weights, setWeights] = useState(() => load("msp_weights", {}));
  const [modal, setModal] = useState(null);

  useEffect(() => { save("msp_dark", dark); document.querySelector('meta[name="theme-color"]').setAttribute("content", dark ? "#191727" : "#5C52E4"); }, [dark]);
  useEffect(() => { save("msp_day", activeDay); }, [activeDay]);
  useEffect(() => { save("msp_week", activeWeek); }, [activeWeek]);
  useEffect(() => { save("msp_checks", checks); }, [checks]);
  useEffect(() => { save("msp_weights", weights); }, [weights]);

  const t = dark ? DARK : LIGHT;
  const day = DAYS.find(d => d.id === activeDay);

  const toggleCheck = key => setChecks(p => ({ ...p, [key]: !p[key] }));
  const saveWeight = (ex, entries) => {
    setWeights(p => ({ ...p, [`d${activeDay}-e${ex.name}`]: entries }));
    setModal(null);
  };

  const completedCount = day.exercises.filter(ex => checks[`d${day.id}-e${ex.name}-w${activeWeek}`]).length;
  const progress = completedCount / day.exercises.length;
  const allDone = completedCount === day.exercises.length;

  const weekTotal = DAYS.reduce((s, d) => s + d.exercises.length, 0);
  const weekDone = DAYS.reduce((s, d) =>
    s + d.exercises.filter(ex => checks[`d${d.id}-e${ex.name}-w${activeWeek}`]).length, 0);

  const isDayComplete = d => d.exercises.every(ex => checks[`d${d.id}-e${ex.name}-w${activeWeek}`]);

  return (
    <div style={{ background: t.bg, minHeight: "100vh", fontFamily: "inherit", maxWidth: 560, margin: "0 auto", transition: "background 250ms" }}>

      {/* Header */}
      <div style={{ background: t.surface, borderBottom: `1px solid ${t.divider}`, padding: "env(safe-area-inset-top, 12px) 1.5rem 1.125rem", paddingTop: `max(env(safe-area-inset-top), 16px)`, transition: "background 250ms" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginBottom: "0.2rem" }}>4-Day Hypertrophy Split</p>
            <h1 style={{ fontSize: "1.5rem", fontWeight: 700, color: t.textPrimary, letterSpacing: "-0.03em", lineHeight: 1.2 }}>
              Miracle Size
            </h1>
            <p style={{ fontSize: "0.8rem", color: t.textTertiary, marginTop: "0.15rem" }}>Chest · Shoulders · Neck</p>
          </div>
          <button
            onClick={() => setDark(p => !p)}
            style={{
              width: 38, height: 38, borderRadius: 9,
              border: `1px solid ${t.border}`, background: t.bg,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              color: t.textTertiary, flexShrink: 0, transition: "background 150ms",
            }}
          >{dark ? <SunIcon /> : <MoonIcon />}</button>
        </div>

        {/* Week selector */}
        <div style={{ marginTop: "1.125rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.5rem" }}>
            <p style={{ fontSize: "0.7rem", color: t.textQuaternary }}>Week</p>
            <p style={{ fontSize: "0.7rem", color: t.textQuaternary }}>{weekDone} / {weekTotal} this week</p>
          </div>
          <div style={{ display: "flex", gap: "0.375rem" }}>
            {Array.from({ length: TOTAL_WEEKS }, (_, i) => {
              const wk = i + 1;
              const isActive = wk === activeWeek;
              const wkDone = DAYS.reduce((s, d) =>
                s + d.exercises.filter(ex => checks[`d${d.id}-e${ex.name}-w${wk}`]).length, 0);
              const wkComplete = wkDone === weekTotal;
              return (
                <button key={wk} onClick={() => setActiveWeek(wk)} style={{
                  flex: 1, height: 32, borderRadius: 7, cursor: "pointer",
                  border: isActive ? "none" : `1px solid ${t.border}`,
                  background: isActive ? t.indigo : wkComplete ? t.successBg : t.bg,
                  color: isActive ? "#fff" : wkComplete ? t.success : t.textTertiary,
                  fontSize: "0.78rem", fontWeight: isActive ? 600 : 400,
                  fontFamily: "inherit", position: "relative", transition: "all 150ms",
                }}>
                  {wk}
                  {wkComplete && !isActive && (
                    <span style={{ position: "absolute", top: -3, right: -3, width: 8, height: 8, borderRadius: "50%", background: t.success, border: `2px solid ${t.surface}` }} />
                  )}
                </button>
              );
            })}
          </div>
          <div style={{ marginTop: "0.625rem", height: 3, background: t.divider, borderRadius: 9999, overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 9999, width: `${(weekDone / weekTotal) * 100}%`, background: weekDone === weekTotal ? t.success : t.indigo, transition: "width 300ms ease" }} />
          </div>
        </div>
      </div>

      {/* Day tabs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", borderBottom: `1px solid ${t.divider}`, background: t.bg }}>
        {DAYS.map(d => {
          const isActive = d.id === activeDay;
          const complete = isDayComplete(d);
          return (
            <button key={d.id} onClick={() => setActiveDay(d.id)} style={{
              background: "transparent", border: "none",
              borderBottom: isActive ? `2px solid ${t.indigo}` : "2px solid transparent",
              padding: "0.65rem 0.5rem", cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: "0.25rem",
            }}>
              <span style={{ fontSize: "0.78rem", fontWeight: isActive ? 600 : 400, color: isActive ? t.indigo : t.textQuaternary }}>
                {d.label}
              </span>
              {complete && <span style={{ width: 5, height: 5, borderRadius: "50%", background: t.success }} />}
            </button>
          );
        })}
      </div>

      {/* Day header */}
      <div style={{ padding: "1.25rem 1.5rem 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.875rem" }}>
          <div>
            <h2 style={{ fontSize: "1.1rem", fontWeight: 600, color: t.textPrimary, lineHeight: 1.2, marginBottom: "0.2rem" }}>{day.name}</h2>
            <p style={{ fontSize: "0.8rem", color: t.textQuaternary }}>{day.focus}</p>
          </div>
          <div style={{ textAlign: "right", flexShrink: 0 }}>
            <p style={{ fontSize: "1.3rem", fontWeight: 700, lineHeight: 1, color: allDone ? t.success : t.textPrimary, transition: "color 250ms" }}>
              {Math.round(progress * 100)}%
            </p>
            <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginTop: "0.15rem" }}>{completedCount}/{day.exercises.length}</p>
          </div>
        </div>
        <div style={{ height: 3, background: t.divider, borderRadius: 9999, marginBottom: "1.25rem", overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 9999, width: `${progress * 100}%`, background: allDone ? t.success : t.indigo, transition: "width 300ms ease, background 250ms" }} />
        </div>
      </div>

      {/* Exercise list */}
      <div style={{ margin: "0 1.5rem 1rem", border: `1px solid ${t.border}`, borderRadius: 10, overflow: "hidden", boxShadow: t.shadowSm }}>
        {day.exercises.map(ex => (
          <ExRow key={ex.name} t={t} ex={ex} dayId={day.id} activeWeek={activeWeek}
            checks={checks} weights={weights}
            onToggle={toggleCheck} onWeightOpen={e => setModal(e)} />
        ))}
      </div>

      {/* Tip */}
      <div style={{ margin: "0 1.5rem 1.5rem", background: t.surface, border: `1px solid ${t.divider}`, borderRadius: 10, padding: "0.75rem 1rem", display: "flex", gap: "0.5rem", alignItems: "flex-start" }}>
        <span style={{ color: t.textQuaternary, flexShrink: 0, marginTop: 1 }}><InfoIcon /></span>
        <p style={{ fontSize: "0.82rem", color: t.textTertiary, lineHeight: 1.5 }}>{day.tip}</p>
      </div>

      {/* Divider */}
      <div style={{ height: 1, background: t.divider, margin: "0 1.5rem" }} />

      {/* Nutrition */}
      <div style={{ padding: "1.5rem" }}>
        <p style={{ fontSize: "0.75rem", color: t.textQuaternary, marginBottom: "0.875rem" }}>Nutrition & Recovery</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.625rem" }}>
          {NUTRITION.map(n => (
            <div key={n.label} style={{ background: t.surface, border: `1px solid ${t.divider}`, borderRadius: 10, padding: "0.875rem 1rem" }}>
              <p style={{ fontSize: "0.7rem", color: t.textQuaternary, marginBottom: "0.25rem" }}>{n.label}</p>
              <p style={{ fontSize: "0.9rem", fontWeight: 500, color: t.textPrimary, lineHeight: 1.3 }}>{n.value}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Divider */}
      <div style={{ height: 1, background: t.divider, margin: "0 1.5rem" }} />

      {/* Neck safety */}
      <div style={{ padding: "1.5rem", paddingBottom: `max(1.5rem, env(safe-area-inset-bottom))` }}>
        <div style={{ background: t.warningBg, border: `1px solid ${t.warningBorder}`, borderRadius: 10, padding: "1rem" }}>
          <p style={{ fontSize: "0.82rem", fontWeight: 600, color: t.warning, marginBottom: "0.5rem" }}>Neck safety</p>
          {["Train neck 2× weekly max", "No jerking or momentum", "Mild soreness is fine", "Sharp pain — stop immediately"].map(n => (
            <p key={n} style={{ fontSize: "0.78rem", color: t.textTertiary, lineHeight: 1.8 }}>{n}</p>
          ))}
        </div>
      </div>

      {/* Weight modal */}
      {modal && (
        <WeightModal
          t={t} exercise={modal}
          weekData={weights[`d${activeDay}-e${modal.name}`] || []}
          onSave={entries => saveWeight(modal, entries)}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
